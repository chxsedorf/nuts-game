<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="NUTS">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="0.32" stop-color="#f6a72d"/>
      <stop offset="0.64" stop-color="#d77810"/>
      <stop offset="1" stop-color="#8d3d07"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4b8" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#fff4b8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff4b8" stop-opacity="0.75"/>
      <stop offset="0.56" stop-color="#fff4b8" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff4b8" stop-opacity="0"/>
    </linearGradient>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#020806" flood-opacity="1"/>
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#572406" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffbb3b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#hardShadow)">
    <text x="28" y="166"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="154"
      font-weight="900"
      letter-spacing="-12"
      fill="url(#gold)"
      stroke="#3b1804"
      stroke-width="10"
      paint-order="stroke fill">NUTS</text>

    <text x="28" y="166"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="154"
      font-weight="900"
      letter-spacing="-12"
      fill="url(#shine)"
      opacity="0.9">NUTS</text>

    <text x="28" y="166"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="154"
      font-weight="900"
      letter-spacing="-12"
      fill="none"
      stroke="#fff0b1"
      stroke-width="3"
      opacity="0.65">NUTS</text>
  </g>
</svg>
